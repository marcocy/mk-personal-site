# Replace repo with your real GitHub username/repository.
# Example: repo: mkallis/my-personal-site
backend:
  name: github
  repo: YOUR-GITHUB-USERNAME/YOUR-REPO-NAME
  branch: main
  # For Cloudflare + GitHub authentication, you normally need an OAuth proxy.
  # After you deploy the proxy, uncomment and set this:
  # base_url: https://YOUR-DECAP-PROXY.workers.dev

media_folder: "public/uploads"
public_folder: "/uploads"

site_url: https://example.com
display_url: https://example.com

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Publish Date", name: "pubDate", widget: "datetime" }
      - { label: "Author", name: "author", widget: "string", default: "Marcos Kallis" }
      - { label: "Featured Image", name: "heroImage", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
