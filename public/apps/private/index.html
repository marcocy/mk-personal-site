<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Private Apps</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;min-height:100vh;display:grid;place-items:center;background:#111827;color:#f9fafb;padding:24px}
    main{max-width:720px;background:#1f2937;border-radius:24px;padding:32px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
    code{background:#374151;padding:2px 6px;border-radius:6px}
    a{color:#93c5fd}
  </style>
</head>
<body>
  <main>
    <h1>Private Apps</h1>
    <p>This folder is reserved for apps you want to password protect.</p>
    <p>Add protected apps inside <code>public/apps/private/</code>.</p>
    <p>The public QR tool should stay outside this folder at <code>public/apps/qrcodegen.html</code>.</p>
    <p><a href="/apps/">Back to apps</a></p>
  </main>
</body>
</html>
